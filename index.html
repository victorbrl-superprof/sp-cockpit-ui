<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Cockpit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo:       #6366f1;
      --indigo-dark:  #4f46e5;
      --indigo-light: #e0e7ff;
      --emerald:      #10b981;
      --emerald-light:#d1fae5;
      --violet:       #8b5cf6;
      --violet-light: #ede9fe;
      --amber:        #f59e0b;
      --amber-light:  #fef3c7;
      --cyan:         #06b6d4;
      --cyan-light:   #cffafe;
      --rose:         #f43f5e;
      --slate-50:     #f8fafc;
      --slate-100:    #f1f5f9;
      --slate-200:    #e2e8f0;
      --slate-400:    #94a3b8;
      --slate-600:    #475569;
      --slate-700:    #334155;
      --slate-900:    #0f172a;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      font-size: 13px;
      background: #eef2ff;
      color: var(--slate-900);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--slate-200); border-radius: 999px; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #8b5cf6 100%);
      padding: 13px 18px 14px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,.07) 0%, transparent 60%);
    }
    .hero-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .hero-left { display: flex; flex-direction: column; gap: 3px; }
    .hero-eyebrow {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255,255,255,.6);
    }
    .hero-name { font-size: 19px; font-weight: 800; color: white; line-height: 1.15; }
    .hero-right { display: flex; gap: 18px; flex-shrink: 0; }
    .hero-stat { text-align: center; }
    .hero-stat-value { font-size: 19px; font-weight: 800; color: white; line-height: 1; font-variant-numeric: tabular-nums; }
    .hero-stat-label { font-size: 10px; color: rgba(255,255,255,.6); margin-top: 2px; white-space: nowrap; }
    .hero-sep { width: 1px; background: rgba(255,255,255,.2); align-self: stretch; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px;
    }
    .col-full { grid-column: 1 / -1; }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04);
      border: 1px solid rgba(0,0,0,.06);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }
    .card:nth-child(1){animation-delay:.00s}
    .card:nth-child(2){animation-delay:.06s}
    .card:nth-child(3){animation-delay:.12s}
    .card:nth-child(4){animation-delay:.18s}
    .card:nth-child(5){animation-delay:.24s}
    .card:nth-child(6){animation-delay:.30s}
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-accent { height: 3px; }
    .accent-indigo  { background: linear-gradient(90deg,#818cf8,#6366f1); }
    .accent-emerald { background: linear-gradient(90deg,#34d399,#10b981); }
    .accent-violet  { background: linear-gradient(90deg,#a78bfa,#8b5cf6); }
    .accent-amber   { background: linear-gradient(90deg,#fbbf24,#f59e0b); }
    .accent-cyan    { background: linear-gradient(90deg,#22d3ee,#06b6d4); }
    .accent-ai      { background: linear-gradient(90deg,#a78bfa,#6366f1,#22d3ee); }

    .card-header {
      padding: 8px 14px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title-wrap { display: flex; align-items: center; gap: 8px; }
    .card-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .icon-indigo  { background: #e0e7ff; }
    .icon-emerald { background: #d1fae5; }
    .icon-violet  { background: #ede9fe; }
    .icon-amber   { background: #fef3c7; }
    .icon-cyan    { background: #cffafe; }
    .card-title { font-size: 12.5px; font-weight: 700; color: var(--slate-700); }
    .badge {
      font-size: 10.5px; font-weight: 700;
      padding: 2px 9px; border-radius: 999px;
    }
    .badge-indigo  { background:#e0e7ff; color:#4338ca; }
    .badge-emerald { background:#d1fae5; color:#065f46; }
    .badge-violet  { background:#ede9fe; color:#5b21b6; }
    .badge-amber   { background:#fef3c7; color:#92400e; }
    .badge-cyan    { background:#cffafe; color:#155e75; }

    .card-body { padding: 4px 14px 8px; }

    /* ── Stats ── */
    .big-stats { display:flex; margin-bottom:10px; }
    .big-stat  { flex:1; text-align:center; padding:5px 4px; }
    .big-stat + .big-stat { border-left:1px solid var(--slate-100); }
    .big-val {
      font-size: 22px; font-weight: 800;
      line-height: 1; letter-spacing: -.03em;
      font-variant-numeric: tabular-nums;
    }
    .val-indigo  { color: var(--indigo); }
    .val-emerald { color: var(--emerald); }
    .val-violet  { color: var(--violet); }
    .val-amber   { color: var(--amber); }
    .val-neutral { color: var(--slate-700); }
    .big-lbl { font-size: 10px; color: var(--slate-400); margin-top:2px; font-weight:500; }

    /* ── Progress ── */
    .prog-block { margin-bottom: 6px; }
    .prog-block:last-of-type { margin-bottom:0; }
    .prog-meta { display:flex; justify-content:space-between; margin-bottom:5px; font-size:11.5px; }
    .prog-lbl { color:var(--slate-600); font-weight:500; }
    .prog-val { font-weight:700; color:var(--slate-900); }
    .track { height:7px; background:var(--slate-100); border-radius:999px; overflow:hidden; }
    .track.sm { height:4px; margin-top:3px; }
    .fill { height:100%; border-radius:999px; transition: width .8s cubic-bezier(.4,0,.2,1); }
    .fill-indigo  { background: linear-gradient(90deg,#818cf8,#6366f1); }
    .fill-emerald { background: linear-gradient(90deg,#34d399,#10b981); }
    .fill-violet  { background: linear-gradient(90deg,#a78bfa,#8b5cf6); }
    .fill-amber   { background: linear-gradient(90deg,#fbbf24,#f59e0b); }
    .fill-cyan    { background: linear-gradient(90deg,#22d3ee,#06b6d4); }

    /* ── KPI list ── */
    .divider { border:none; border-top:1px solid var(--slate-100); margin:6px 0; }
    .kpi-list { display:flex; flex-direction:column; }
    .kpi-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid var(--slate-100); }
    .kpi-row:last-child { border-bottom:none; }
    .kpi-lbl { font-size:12px; color:var(--slate-400); font-weight:500; }
    .kpi-val { font-size:12px; font-weight:700; color:var(--slate-900); }

    /* ── Themes ── */
    .themes-grid { columns: 2; column-gap: 24px; }
    .themes-grid > div { break-inside: avoid; margin-bottom: 6px; }
    .accent-rose { background: linear-gradient(90deg,#fb7185,#f43f5e); }
    .icon-rose   { background: #ffe4e6; }
    .badge-rose  { background: #ffe4e6; color: #9f1239; }
    .fill-rose   { background: linear-gradient(90deg,#fb7185,#f43f5e); }
    .theme-meta { display:flex; align-items:center; gap:4px; font-size:11.5px; margin-bottom:2px; }
    .theme-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--slate-700); font-weight:500; }
    .theme-count { font-weight:700; color:var(--rose); flex-shrink:0; }

    /* ── AI ── */
    .ai-desc { font-size:11.5px; color:var(--slate-400); margin-bottom:5px; line-height:1.4; }
    .ai-input-wrap { position:relative; }
    #ai-question {
      display:block; width:100%;
      border:1.5px solid var(--slate-200); border-radius:10px;
      padding:11px 13px; font-family:inherit; font-size:12px;
      resize:none; background:var(--slate-50); color:var(--slate-900);
      outline:none; min-height:46px;
      transition:border-color .15s, box-shadow .15s;
    }
    #ai-question:focus { border-color:var(--indigo); box-shadow:0 0 0 3px rgba(99,102,241,.12); background:white; }
    #ai-placeholder {
      position:absolute; top:12px; left:13px; right:13px;
      pointer-events:none; font-size:12px; color:var(--slate-400);
      transition:opacity .4s ease; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .ai-footer { display:flex; align-items:center; gap:10px; margin-top:5px; flex-wrap:wrap; }
    #ai-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 20px;
      background:linear-gradient(135deg,#7c3aed,#6366f1);
      color:white; border:none; border-radius:9px;
      font-size:12.5px; font-weight:700; cursor:pointer;
      box-shadow:0 2px 8px rgba(99,102,241,.35);
      transition:opacity .15s, transform .15s, box-shadow .15s;
    }
    #ai-btn:hover:not(:disabled) { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 14px rgba(99,102,241,.45); }
    #ai-btn:active:not(:disabled) { transform:translateY(0); }
    #ai-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .ai-hint { font-size:11px; color:var(--slate-400); }
    kbd { font-size:10px; background:var(--slate-100); border:1px solid var(--slate-200); border-radius:4px; padding:1px 5px; font-family:inherit; }
    #ai-spinner { font-size:11px; color:var(--slate-400); display:none; }

    #ai-result { margin-top:14px; display:none; }
    .ai-quote { font-size:11px; color:var(--slate-400); font-style:italic; margin-bottom:10px; padding-left:10px; border-left:2px solid var(--indigo-light); }
    .table-wrap { overflow-x:auto; border:1px solid var(--slate-200); border-radius:10px; }
    table { width:100%; border-collapse:collapse; font-size:11.5px; }
    thead { background:var(--slate-50); }
    th { padding:8px 12px; text-align:left; font-weight:700; color:var(--slate-400); white-space:nowrap; border-bottom:1px solid var(--slate-200); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; }
    td { padding:7px 12px; color:var(--slate-700); border-bottom:1px solid var(--slate-100); white-space:nowrap; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--slate-50); }
    details { margin-top:10px; }
    summary { font-size:11px; color:var(--slate-400); cursor:pointer; user-select:none; }
    summary::-webkit-details-marker { display:none; }
    pre { margin-top:8px; padding:10px 12px; background:var(--slate-50); border-radius:8px; font-size:10.5px; color:var(--slate-600); overflow-x:auto; white-space:pre-wrap; word-break:break-word; border:1px solid var(--slate-200); }

    /* ── State ── */
    .state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:12px; color:var(--slate-400); font-size:13px; }
    .state.error { color:var(--rose); }
    .spinner { width:32px; height:32px; border:3px solid var(--indigo-light); border-top-color:var(--indigo); border-radius:50%; animation:spin .75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"><div class="state"><div class="spinner"></div><span>Chargement du dashboard…</span></div></div>

  <script>
    const P      = new URLSearchParams(location.search);
    const CID    = P.get('hubspot_company_id') || '';
    const TOKEN  = P.get('token') || '';
    const BASE   = 'https://yhtxrjegdeuwkcjvkfkt.supabase.co/functions/v1';
    const API    = BASE + '/cse-sales-cockpit';
    const AI_API = BASE + '/cse-ai-query';

    let currentCseId  = null;
    let suggestionIdx = 0;

    const AI_SUGGESTIONS = [
      "Top 5 membres les plus actifs",
      "Membres sans leçon depuis 3 mois",
      "CA par thématique ce trimestre",
      "Taux de conversion des mises en relation",
      "Membres ayant utilisé le wallet ce mois",
      "Évolution des leçons mois par mois",
      "Thématiques avec le moins de demandes",
      "Membres avec plus de 5 MR acceptées",
      "Panier moyen wallet par membre",
      "Quelles sont les matières les plus populaires ?",
    ];

    /* ── Helpers ── */
    const fmt    = (n, d=0) => n==null ? '–' : isNaN(+n) ? String(n) : (+n).toLocaleString('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d});
    const fmtEur = (n)      => n==null ? '–' : isNaN(+n) ? '–' : (+n).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
    const pct    = (a,b)    => !b ? 0 : Math.min(100,Math.round(a/b*100));
    const esc    = (s)      => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    /* ── Sub-components ── */
    const stat = (val,lbl,cls='val-neutral') =>
      `<div class="big-stat"><div class="big-val ${cls}">${esc(val)}</div><div class="big-lbl">${esc(lbl)}</div></div>`;

    const prog = (lbl,val,p,cls) =>
      `<div class="prog-block"><div class="prog-meta"><span class="prog-lbl">${esc(lbl)}</span><span class="prog-val">${esc(val)}</span></div><div class="track"><div class="fill ${cls}" style="width:${p}%"></div></div></div>`;

    const kpi = (lbl,val) =>
      `<div class="kpi-row"><span class="kpi-lbl">${esc(lbl)}</span><span class="kpi-val">${esc(val)}</span></div>`;

    const card = (accentCls,iconCls,icon,title,badge,body) =>
      `<div class="card"><div class="card-accent ${accentCls}"></div><div class="card-header"><div class="card-title-wrap"><div class="card-icon ${iconCls}">${icon}</div><span class="card-title">${esc(title)}</span></div>${badge}</div><div class="card-body">${body}</div></div>`;

    /* ── Render ── */
    function render(rows) {
      const f = rows[0];
      currentCseId = f.cse_id || null;

      const cseName     = f.cse_name               || 'CSE';
      const days        = f.window_days             || 365;
      const membTotal   = f.memberships_total       || 0;
      const membActive  = f.memberships_active      || 0;
      const membDormant = f.memberships_dormant     || 0;
      const mrTotal     = f.mise_relations_total    || 0;
      const mrAccepted  = f.mise_relations_accepted || 0;
      const mrPeople    = f.mr_people_count         || 0;
      const mrAvg       = f.mr_avg_per_person       || 0;
      const lessTotal   = f.lessons_total           || 0;
      const lessComp    = f.lessons_completed       || 0;
      const lessCa      = f.lessons_ca              || 0;
      const passActifs  = f.pass_actifs             || 0;
      const passCa      = f.pass_ca                 || 0;
      const walletTx    = f.wallet_transactions_total || 0;
      const walletTotal = f.wallet_amount_total     || 0;
      const walletAvg   = f.wallet_amount_avg       || 0;

      const themes = rows.filter(r => r.theme && (r.theme_count||0) > 0)
        .map(r => ({ theme: r.theme, count: r.theme_count }))
        .sort((a,b) => b.count - a.count);

      const pA = pct(membActive,  membTotal);
      const pD = pct(membDormant, membTotal);
      const pM = pct(mrAccepted,  mrTotal);
      const pL = pct(lessComp,    lessTotal);
      const mT = themes[0]?.count || 1;

      /* Cards */
      const membCard = card('accent-indigo','icon-indigo','👥','Membres',
        `<span class="badge badge-indigo">${pA}% actifs</span>`,
        `<div class="big-stats">${stat(fmt(membTotal),'Total membres','val-indigo')}${stat(fmt(membActive),'Actifs','val-emerald')}${stat(fmt(membDormant),'Dormants','val-neutral')}</div>
         ${prog("Taux d'activation",`${pA}%`,pA,'fill-indigo')}
         ${prog('Dormants',`${pD}%`,pD,'fill-amber')}`);

      const mrCard = card('accent-emerald','icon-emerald','🤝','Mises en Relation',
        mrTotal > 0 ? `<span class="badge badge-emerald">${mrPeople} personnes</span>` : '',
        mrTotal === 0
          ? '<p style="font-size:12px;color:var(--slate-400);padding:8px 0">Aucune mise en relation sur la période.</p>'
          : `<div class="big-stats">${stat(fmt(mrTotal),'Total MR','val-emerald')}${stat(fmt(mrAccepted),'Acceptées','val-emerald')}${stat(`${pM}%`,'Taux','val-emerald')}</div>
             ${prog("Taux d'acceptation",`${fmt(mrAccepted)} / ${fmt(mrTotal)}`,pM,'fill-emerald')}
             <div class="divider"></div><div class="kpi-list">${kpi('Personnes touchées',fmt(mrPeople))}${kpi('Moyenne / personne',fmt(mrAvg,1))}</div>`);

      const lessCard = card('accent-violet','icon-violet','📚','Leçons',
        lessTotal > 0 ? `<span class="badge badge-violet">${pL}% complétées</span>` : '',
        lessTotal === 0
          ? '<p style="font-size:12px;color:var(--slate-400);padding:8px 0">Aucune leçon sur la période.</p>'
          : `<div class="big-stats">${stat(fmt(lessTotal),'Total leçons','val-violet')}${stat(fmt(lessComp),'Complétées','val-violet')}${stat(`${pL}%`,'Taux','val-violet')}</div>
             ${prog('Taux de complétion',`${fmt(lessComp)} / ${fmt(lessTotal)}`,pL,'fill-violet')}
             <div class="divider"></div><div class="kpi-list">${kpi('CA leçons',fmtEur(lessCa))}</div>`);

      const walletCard = card('accent-amber','icon-amber','💳','Pass & Wallet',
        walletTx > 0 ? `<span class="badge badge-amber">${fmt(walletTx)} tx</span>` : '',
        `<div class="big-stats">${stat(fmt(passActifs),'Pass actifs','val-amber')}${stat(fmt(walletTx),'Transactions','val-amber')}</div>
         <div class="kpi-list">${kpi('CA pass',fmtEur(passCa))}${kpi('Total rechargé',fmtEur(walletTotal))}${kpi('Moy. / transaction',fmtEur(walletAvg))}</div>`);

      const themesCard = themes.length === 0 ? '' :
        `<div class="card col-full"><div class="card-accent accent-rose"></div>
         <div class="card-header"><div class="card-title-wrap"><div class="card-icon icon-rose">🎯</div><span class="card-title">Top Thématiques</span></div><span class="badge badge-rose">${themes.length} matières</span></div>
         <div class="card-body"><div class="themes-grid">${
           themes.slice(0,10).map((t,i) => {
             const m = i<3 ? ['🥇','🥈','🥉'][i] : `${i+1}.`;
             return `<div><div class="theme-meta"><span class="theme-name">${esc(m)} ${esc(t.theme)}</span><span class="theme-count">${t.count}</span></div><div class="track sm"><div class="fill fill-rose" style="width:${pct(t.count,mT)}%"></div></div></div>`;
           }).join('')
         }</div></div></div>`;

      const aiCard =
        `<div class="card col-full"><div class="card-accent accent-ai"></div>
         <div class="card-header"><div class="card-title-wrap"><div class="card-icon icon-violet">✦</div><span class="card-title">Analyse IA</span></div><span class="badge badge-violet">GPT-5.2 · Superprof</span></div>
         <div class="card-body">
           <p class="ai-desc">Posez une question en langage naturel sur ce CSE — membres, leçons, wallet, thématiques, tendances…</p>
           <div class="ai-input-wrap">
             <textarea id="ai-question" rows="3" placeholder=" "></textarea>
             <span id="ai-placeholder">ex : ${esc(AI_SUGGESTIONS[0])}…</span>
           </div>
           <div class="ai-footer">
             <button id="ai-btn" onclick="handleAI()">✦ Analyser</button>
             <span id="ai-spinner">⏳ Analyse en cours…</span>
             <span class="ai-hint">ou <kbd>⌘↵</kbd> pour envoyer</span>
           </div>
           <div id="ai-result"></div>
         </div></div>`;

      document.getElementById('root').innerHTML = `
        <div class="hero"><div class="hero-inner">
          <div class="hero-left">
            <span class="hero-eyebrow">Sales Cockpit · ${days} derniers jours</span>
            <span class="hero-name">${esc(cseName)}</span>
          </div>
          <div class="hero-right">
            <div class="hero-stat"><div class="hero-stat-value">${fmt(membTotal)}</div><div class="hero-stat-label">membres</div></div>
            <div class="hero-sep"></div>
            <div class="hero-stat"><div class="hero-stat-value">${fmtEur(lessCa + passCa)}</div><div class="hero-stat-label">CA total</div></div>
            <div class="hero-sep"></div>
            <div class="hero-stat"><div class="hero-stat-value">${fmt(lessTotal)}</div><div class="hero-stat-label">leçons</div></div>
          </div>
        </div></div>
        <div class="grid">${membCard}${mrCard}${lessCard}${walletCard}${themesCard}${aiCard}</div>`;

      /* Suggestions rotatives */
      const ph = document.getElementById('ai-placeholder');
      const q  = document.getElementById('ai-question');
      q.addEventListener('focus',  () => { ph.style.opacity = '0'; });
      q.addEventListener('blur',   () => { if (!q.value) ph.style.opacity = '1'; });
      q.addEventListener('input',  () => { ph.style.opacity = q.value ? '0' : '1'; });
      q.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleAI(); });

      setInterval(() => {
        if (document.activeElement === q || q.value) return;
        ph.style.opacity = '0';
        setTimeout(() => {
          suggestionIdx = (suggestionIdx + 1) % AI_SUGGESTIONS.length;
          ph.textContent = `ex : ${AI_SUGGESTIONS[suggestionIdx]}…`;
          ph.style.opacity = '1';
        }, 400);
      }, 3000);
    }

    /* ── AI ── */
    async function handleAI() {
      const q = document.getElementById('ai-question').value.trim();
      if (!q) return;
      const btn = document.getElementById('ai-btn');
      const sp  = document.getElementById('ai-spinner');
      const res = document.getElementById('ai-result');
      btn.disabled = true; sp.style.display = 'inline'; res.style.display = 'none';
      try {
        const params = new URLSearchParams({ question: q, hubspot_company_id: CID });
        if (currentCseId) params.set('cse_id', currentCseId);
        const r    = await fetch(`${AI_API}?${params}`, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const json = await r.json();
        if (!json.ok) {
          let html = `<p style="font-size:12px;color:var(--rose);margin-top:8px">⚠ ${esc(json.error || 'Erreur IA')}</p>`;
          if (json.sql) html += `<details open><summary>▸ SQL généré</summary><pre>${esc(json.sql)}</pre></details>`;
          if (json.details) html += `<details><summary>▸ Détail de l'erreur</summary><pre>${esc(typeof json.details === 'string' ? json.details : JSON.stringify(json.details, null, 2))}</pre></details>`;
          res.innerHTML = html;
          res.style.display = 'block';
          return;
        }
        const rows = Array.isArray(json.data) ? json.data : [];
        if (!rows.length) {
          res.innerHTML = '<p style="font-size:12px;color:var(--slate-400);margin-top:8px;padding-left:10px;border-left:2px solid var(--indigo-light)">Aucun résultat pour cette question.</p>';
        } else {
          const cols  = Object.keys(rows[0]);
          const thead = '<tr>' + cols.map(c => `<th>${esc(c.replace(/_/g,' '))}</th>`).join('') + '</tr>';
          const tbody = rows.slice(0,50).map(r => '<tr>' + cols.map(c => `<td>${esc(r[c]==null?'–':String(r[c]))}</td>`).join('') + '</tr>').join('');
          let html = '';
          if (json.question) html += `<p class="ai-quote">&ldquo;${esc(json.question)}&rdquo;</p>`;
          html += `<div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
          if (json.sql) html += `<details><summary>▸ Voir le SQL généré</summary><pre>${esc(json.sql)}</pre></details>`;
          res.innerHTML = html;
        }
        res.style.display = 'block';
      } catch(e) {
        res.innerHTML = `<p style="font-size:12px;color:var(--rose);margin-top:8px">⚠ ${esc(e.message)}</p>`;
        res.style.display = 'block';
      } finally {
        btn.disabled = false; sp.style.display = 'none';
      }
    }

    /* ── Init ── */
    (async () => {
      if (!CID || !TOKEN) {
        document.getElementById('root').innerHTML = '<div class="state error">⚠ Paramètres manquants</div>';
        return;
      }
      try {
        const r    = await fetch(`${API}?hubspot_company_id=${encodeURIComponent(CID)}&days=365&top_n=14`, { headers:{ Authorization:`Bearer ${TOKEN}` }});
        const json = await r.json();
        if (!json.ok) throw new Error(json.error || 'Erreur API');
        if (!json.data?.length) throw new Error('CSE non lié à ce compte HubSpot');
        render(json.data);
      } catch(e) {
        document.getElementById('root').innerHTML = `<div class="state error">⚠ ${esc(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
