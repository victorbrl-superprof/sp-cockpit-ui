<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Sales Cockpit — Head of Sales</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --indigo: #6366f1;
      --indigo-dark: #4f46e5;
      --indigo-light: #e0e7ff;
      --emerald: #10b981;
      --emerald-light: #d1fae5;
      --violet: #8b5cf6;
      --violet-light: #ede9fe;
      --amber: #f59e0b;
      --amber-light: #fef3c7;
      --cyan: #06b6d4;
      --cyan-light: #cffafe;
      --rose: #f43f5e;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-400: #94a3b8;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      font-size: 13px;
      background: #eef2ff;
      color: var(--slate-900);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--slate-200);
      border-radius: 999px;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #8b5cf6 100%);
      padding: 10px 18px 10px;
      color: white;
      position: relative;
      z-index: 10;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(255, 255, 255, .07) 0%, transparent 60%);
    }

    .hero-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hero-eyebrow {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255, 255, 255, .6);
    }

    .hero-name {
      font-size: 19px;
      font-weight: 800;
      color: white;
      line-height: 1.15;
    }

    .hero-right {
      display: flex;
      gap: 18px;
      flex-shrink: 0;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-value {
      font-size: 19px;
      font-weight: 800;
      color: white;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .hero-stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, .6);
      margin-top: 2px;
      white-space: nowrap;
    }

    .hero-sep {
      width: 1px;
      background: rgba(255, 255, 255, .2);
      align-self: stretch;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
    }

    .col-full {
      grid-column: 1 / -1;
    }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .05), 0 4px 16px rgba(0, 0, 0, .04);
      border: 1px solid rgba(0, 0, 0, .06);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }

    .card:nth-child(1) {
      animation-delay: .00s
    }

    .card:nth-child(2) {
      animation-delay: .06s
    }

    .card:nth-child(3) {
      animation-delay: .12s
    }

    .card:nth-child(4) {
      animation-delay: .18s
    }

    .card:nth-child(5) {
      animation-delay: .24s
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-accent {
      height: 3px;
    }

    .accent-indigo {
      background: linear-gradient(90deg, #818cf8, #6366f1);
    }

    .accent-emerald {
      background: linear-gradient(90deg, #34d399, #10b981);
    }

    .accent-violet {
      background: linear-gradient(90deg, #a78bfa, #8b5cf6);
    }

    .accent-amber {
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
    }

    .accent-cyan {
      background: linear-gradient(90deg, #22d3ee, #06b6d4);
    }

    .accent-ai {
      background: linear-gradient(90deg, #a78bfa, #6366f1, #22d3ee);
    }

    .card-header {
      padding: 6px 14px 3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .icon-indigo {
      background: #e0e7ff;
    }

    .icon-emerald {
      background: #d1fae5;
    }

    .icon-violet {
      background: #ede9fe;
    }

    .icon-amber {
      background: #fef3c7;
    }

    .icon-cyan {
      background: #cffafe;
    }

    .card-title {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--slate-700);
    }

    .badge {
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 999px;
    }

    .badge-indigo {
      background: #e0e7ff;
      color: #4338ca;
    }

    .badge-emerald {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-violet {
      background: #ede9fe;
      color: #5b21b6;
    }

    .badge-amber {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-cyan {
      background: #cffafe;
      color: #155e75;
    }

    .card-body {
      padding: 3px 14px 6px;
    }

    /* ── Stats ── */
    .big-stats {
      display: flex;
      margin-bottom: 6px;
    }

    .big-stat {
      flex: 1;
      text-align: center;
      padding: 3px 4px;
    }

    .big-stat+.big-stat {
      border-left: 1px solid var(--slate-100);
    }

    .big-val {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.03em;
      font-variant-numeric: tabular-nums;
    }

    .val-indigo {
      color: var(--indigo);
    }

    .val-emerald {
      color: var(--emerald);
    }

    .val-violet {
      color: var(--violet);
    }

    .val-amber {
      color: var(--amber);
    }

    .val-neutral {
      color: var(--slate-700);
    }

    .big-lbl {
      font-size: 10px;
      color: var(--slate-400);
      margin-top: 2px;
      font-weight: 500;
    }

    /* ── Progress ── */
    .prog-block {
      margin-bottom: 6px;
    }

    .prog-block:last-of-type {
      margin-bottom: 0;
    }

    .prog-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 11.5px;
    }

    .prog-lbl {
      color: var(--slate-600);
      font-weight: 500;
    }

    .prog-val {
      font-weight: 700;
      color: var(--slate-900);
    }

    .track {
      height: 7px;
      background: var(--slate-100);
      border-radius: 999px;
      overflow: hidden;
    }

    .track.sm {
      height: 4px;
      margin-top: 3px;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      transition: width .8s cubic-bezier(.4, 0, .2, 1);
    }

    .fill-indigo {
      background: linear-gradient(90deg, #818cf8, #6366f1);
    }

    .fill-emerald {
      background: linear-gradient(90deg, #34d399, #10b981);
    }

    .fill-violet {
      background: linear-gradient(90deg, #a78bfa, #8b5cf6);
    }

    .fill-amber {
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
    }

    .fill-cyan {
      background: linear-gradient(90deg, #22d3ee, #06b6d4);
    }

    /* ── KPI list ── */
    .divider {
      border: none;
      border-top: 1px solid var(--slate-100);
      margin: 6px 0;
    }

    .kpi-list {
      display: flex;
      flex-direction: column;
    }

    .kpi-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--slate-100);
    }

    .kpi-row:last-child {
      border-bottom: none;
    }

    .kpi-lbl {
      font-size: 12px;
      color: var(--slate-400);
      font-weight: 500;
    }

    .kpi-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--slate-900);
    }

    /* ── AI ── */
    .ai-desc {
      font-size: 11.5px;
      color: var(--slate-400);
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .ai-input-wrap {
      position: relative;
    }

    #ai-question {
      display: block;
      width: 100%;
      border: 1.5px solid var(--slate-200);
      border-radius: 10px;
      padding: 11px 13px;
      font-family: inherit;
      font-size: 12px;
      resize: none;
      background: var(--slate-50);
      color: var(--slate-900);
      outline: none;
      min-height: 46px;
      transition: border-color .15s, box-shadow .15s;
    }

    #ai-question:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
      background: white;
    }

    #ai-placeholder {
      position: absolute;
      top: 12px;
      left: 13px;
      right: 13px;
      pointer-events: none;
      font-size: 12px;
      color: var(--slate-400);
      transition: opacity .4s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ai-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    #ai-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 20px;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(99, 102, 241, .35);
      transition: opacity .15s, transform .15s, box-shadow .15s;
    }

    #ai-btn:hover:not(:disabled) {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(99, 102, 241, .45);
    }

    #ai-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #ai-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .ai-hint {
      font-size: 11px;
      color: var(--slate-400);
    }

    kbd {
      font-size: 10px;
      background: var(--slate-100);
      border: 1px solid var(--slate-200);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
    }

    #ai-spinner {
      font-size: 11px;
      color: var(--slate-400);
      display: none;
    }

    #ai-result {
      margin-top: 14px;
      display: none;
    }

    .ai-quote {
      font-size: 11px;
      color: var(--slate-400);
      font-style: italic;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 2px solid var(--indigo-light);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--slate-200);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }

    thead {
      background: var(--slate-50);
    }

    th {
      padding: 8px 12px;
      text-align: left;
      font-weight: 700;
      color: var(--slate-400);
      white-space: nowrap;
      border-bottom: 1px solid var(--slate-200);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    td {
      padding: 7px 12px;
      color: var(--slate-700);
      border-bottom: 1px solid var(--slate-100);
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--slate-50);
    }

    details {
      margin-top: 10px;
    }

    summary {
      font-size: 11px;
      color: var(--slate-400);
      cursor: pointer;
      user-select: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    pre {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--slate-50);
      border-radius: 8px;
      font-size: 10.5px;
      color: var(--slate-600);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--slate-200);
    }

    /* ── State ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 12px;
      color: var(--slate-400);
      font-size: 13px;
    }

    .state.error {
      color: var(--rose);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--indigo-light);
      border-top-color: var(--indigo);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Period tabs — Liquid Glass ── */
    .period-tabs {
      display: flex;
      background: rgba(255, 255, 255, .10);
      border-radius: 12px;
      padding: 3px;
      gap: 1px;
      margin-top: 5px;
      align-self: flex-start;
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, .22);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, .30) inset,
        0 4px 16px rgba(0, 0, 0, .12),
        0 1px 3px rgba(0, 0, 0, .08);
    }

    .period-tab {
      padding: 4px 13px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: rgba(255, 255, 255, .80);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
      font-family: inherit;
      letter-spacing: .01em;
    }

    .period-tab.active {
      background: rgba(255, 255, 255, .90);
      color: var(--indigo-dark);
      box-shadow:
        0 1px 4px rgba(0, 0, 0, .16),
        0 0 0 .5px rgba(255, 255, 255, .55) inset;
    }

    .period-tab:hover:not(.active) {
      background: rgba(255, 255, 255, .18);
      color: white;
    }

    /* ── Dark toggle ── */
    .dark-toggle {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, .15);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .dark-toggle:hover {
      background: rgba(255, 255, 255, .28);
    }

    /* ── CSV button ── */
    .csv-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 5px 12px;
      background: var(--slate-100);
      border: 1px solid var(--slate-200);
      border-radius: 7px;
      color: var(--slate-600);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    .csv-btn:hover {
      background: var(--slate-200);
    }

    /* ── Dark mode ── */
    body.dark {
      background: #0f172a;
      color: #f8fafc;
    }

    body.dark .card {
      background: #1e293b;
      border-color: rgba(255, 255, 255, .07);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .3);
    }

    body.dark .card-title {
      color: #e2e8f0;
    }

    body.dark .track {
      background: #334155;
    }

    body.dark .kpi-lbl {
      color: #64748b;
    }

    body.dark .kpi-val {
      color: #f1f5f9;
    }

    body.dark .kpi-row {
      border-bottom-color: #334155;
    }

    body.dark .divider {
      border-top-color: #334155;
    }

    body.dark .prog-lbl {
      color: #94a3b8;
    }

    body.dark .prog-val {
      color: #f1f5f9;
    }

    body.dark .big-lbl {
      color: #64748b;
    }

    body.dark .ai-desc {
      color: #64748b;
    }

    body.dark #ai-question {
      background: #1e293b;
      color: #e2e8f0;
      border-color: #334155;
    }

    body.dark #ai-question:focus {
      background: #263248;
    }

    body.dark #ai-placeholder {
      color: #64748b;
    }

    body.dark .ai-hint {
      color: #64748b;
    }

    body.dark .ai-quote {
      color: #64748b;
    }

    body.dark kbd {
      background: #334155;
      border-color: #475569;
      color: #94a3b8;
    }

    body.dark .table-wrap {
      border-color: #334155;
    }

    body.dark thead {
      background: #0f172a;
    }

    body.dark th {
      color: #64748b;
      border-bottom-color: #334155;
    }

    body.dark td {
      color: #94a3b8;
      border-bottom-color: #1e293b;
    }

    body.dark tr:hover td {
      background: #263248;
    }

    body.dark pre {
      background: #0f172a;
      border-color: #334155;
      color: #94a3b8;
    }

    body.dark summary {
      color: #64748b;
    }

    body.dark .badge-indigo {
      background: #3730a3;
      color: #a5b4fc;
    }

    body.dark .badge-emerald {
      background: #064e3b;
      color: #6ee7b7;
    }

    body.dark .badge-violet {
      background: #4c1d95;
      color: #c4b5fd;
    }

    body.dark .badge-amber {
      background: #78350f;
      color: #fcd34d;
    }

    body.dark .csv-btn {
      background: #334155;
      border-color: #475569;
      color: #94a3b8;
    }

    body.dark .csv-btn:hover {
      background: #475569;
    }

    body.dark .state {
      color: #475569;
    }

    body.dark .state.error {
      color: #fb7185;
    }

    body.dark .spinner {
      border-color: #334155;
      border-top-color: var(--indigo);
    }

    /* ── Card toggle ── */
    .card-toggle {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      opacity: .3;
      transition: opacity .2s;
      padding: 2px 4px;
      line-height: 1;
    }

    .card-toggle:hover {
      opacity: .8;
    }

    .card.card-hidden {
      display: none;
    }

    /* ── Restore bar ── */
    .restore-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 8px 0;
    }

    .restore-bar:empty {
      display: none;
    }

    .restore-chip {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      border: 1.5px dashed var(--slate-200);
      border-radius: 8px;
      background: white;
      color: var(--slate-500);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .restore-chip:hover {
      border-color: var(--indigo);
      color: var(--indigo);
      background: var(--indigo-light);
    }

    body.dark .restore-chip {
      background: #1e293b;
      border-color: #475569;
      color: #94a3b8;
    }

    body.dark .restore-chip:hover {
      border-color: var(--indigo);
      color: #a5b4fc;
      background: #3730a3;
    }

    /* ── CSE combobox — Liquid Glass ── */
    .cse-combo { position: relative; }
    .cse-combo-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 12px;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      box-shadow:
        0 1px 0 rgba(255,255,255,.30) inset,
        0 4px 16px rgba(0,0,0,.12),
        0 1px 3px rgba(0,0,0,.08);
      color: white; font-size: 11px; font-weight: 600;
      font-family: inherit; cursor: pointer; outline: none;
      transition: background .18s ease, border-color .18s ease;
    }
    .cse-combo-btn::before { content: '🏢'; font-size: 11px; }
    .cse-combo-btn:hover {
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.38);
    }
    .cse-combo-label { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cse-combo-arrow { font-size: 9px; opacity: .65; flex-shrink: 0; }

    /* Panel — frosted glass */
    .cse-combo-panel {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
      min-width: 240px; max-width: 320px;
      background: rgba(248, 250, 252, .88);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.65);
      box-shadow:
        0 1px 0 rgba(255,255,255,.8) inset,
        0 8px 32px rgba(0,0,0,.14),
        0 2px 8px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .cse-search-wrap { padding: 8px; border-bottom: 1px solid rgba(0,0,0,.06); }
    .cse-search-input {
      width: 100%; padding: 5px 9px;
      border: 1px solid rgba(0,0,0,.12); border-radius: 8px;
      font-size: 12px; outline: none; font-family: inherit;
      background: rgba(255,255,255,.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--slate-900);
      transition: border-color .15s, box-shadow .15s;
    }
    .cse-search-input:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      background: rgba(255,255,255,.9);
    }
    .cse-list { max-height: 220px; overflow-y: auto; }
    .cse-opt {
      padding: 7px 12px; font-size: 12px; cursor: pointer;
      color: var(--slate-700); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      transition: background .1s;
    }
    .cse-opt:hover { background: rgba(99,102,241,.08); color: var(--indigo); }
    .cse-opt.selected { font-weight: 700; color: var(--indigo); }

    /* Dark mode panel */
    body.dark .cse-combo-panel {
      background: rgba(15, 23, 42, .80);
      border-color: rgba(255,255,255,.10);
      box-shadow:
        0 1px 0 rgba(255,255,255,.06) inset,
        0 8px 32px rgba(0,0,0,.45),
        0 2px 8px rgba(0,0,0,.25);
    }
    body.dark .cse-search-wrap { border-bottom-color: rgba(255,255,255,.07); }
    body.dark .cse-search-input {
      background: rgba(30,41,59,.7); border-color: rgba(255,255,255,.12); color: #e2e8f0;
    }
    body.dark .cse-search-input:focus { border-color: var(--indigo); background: rgba(30,41,59,.9); }
    body.dark .cse-opt { color: #cbd5e1; }
    body.dark .cse-opt:hover { background: rgba(99,102,241,.15); color: #a5b4fc; }

    /* ── CSE zoom banner ── */
    .cse-banner {
      background: linear-gradient(90deg, #4f46e5, #8b5cf6);
      color: white;
      padding: 5px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 11.5px;
      font-weight: 600;
    }

    .cse-banner-back {
      border: none;
      background: rgba(255, 255, 255, .2);
      color: white;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    .cse-banner-back:hover {
      background: rgba(255, 255, 255, .35);
    }

    /* ── Ranking card table ── */
    .rank-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--slate-200);
      border-radius: 10px;
    }

    .rank-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }

    .rank-table thead {
      background: var(--slate-50);
    }

    .rank-table th {
      padding: 7px 10px;
      text-align: left;
      font-weight: 700;
      color: var(--slate-400);
      white-space: nowrap;
      border-bottom: 1px solid var(--slate-200);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .rank-table td {
      padding: 6px 10px;
      color: var(--slate-700);
      border-bottom: 1px solid var(--slate-100);
      white-space: nowrap;
    }

    .rank-table tr:last-child td {
      border-bottom: none;
    }

    .rank-table tr.rank-clickable {
      cursor: pointer;
    }

    .rank-table tr.rank-clickable:hover td {
      background: #eef2ff;
    }

    .rank-table .rank-name {
      font-weight: 600;
      color: var(--slate-900);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
    }

    .rank-badge-capture {
      background: #cffafe;
      color: #155e75;
    }

    /* ── Sortable column headers ── */
    .rth { cursor: pointer; user-select: none; }
    .rth:hover { color: var(--cyan); }
    .rth .si { font-size: 9px; margin-left: 2px; opacity: .35; vertical-align: middle; }
    .rth.sort-active { color: var(--slate-600); }
    .rth.sort-active .si { opacity: 1; color: var(--cyan); }

    body.dark .rank-table-wrap {
      border-color: #334155;
    }

    body.dark .rank-table thead {
      background: #0f172a;
    }

    body.dark .rank-table th {
      color: #64748b;
      border-bottom-color: #334155;
    }

    body.dark .rank-table td {
      color: #94a3b8;
      border-bottom-color: #1e293b;
    }

    body.dark .rank-table tr.rank-clickable:hover td {
      background: #263248;
    }

    body.dark .rank-table .rank-name {
      color: #f1f5f9;
    }

    body.dark .rth:hover, body.dark .rth.sort-active .si { color: var(--cyan); }
    body.dark .rth.sort-active { color: #e2e8f0; }

    body.dark .cse-banner {
      background: linear-gradient(90deg, #3730a3, #4c1d95);
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="state">
      <div class="spinner"></div><span>Chargement du dashboard…</span>
    </div>
  </div>

  <script>
    const P = new URLSearchParams(location.search);
    const TOKEN = P.get('token') || '';
    const BASE = 'https://yhtxrjegdeuwkcjvkfkt.supabase.co/functions/v1';
    const API = BASE + '/cse-sales-cockpit-global';
    const CSE_API = BASE + '/cse-sales-cockpit';
    const AI_API = BASE + '/global-ai-query';
    const CSE_AI_API = BASE + '/cse-ai-query';

    let suggestionIdx = 0;
    let selectedDays = 365;
    let lastAiRows = [];
    let lastAiCols = [];
    let rankingData = [];
    let rankSortKey = 'lessons_ca';
    let rankSortDir = 'desc';

    let selectedCseHubspotId = null;
    let selectedCseName = null;
    let selectedCseId = null;
    const HIDDEN_KEY = 'cockpit-global-hidden-cards';
    let hiddenCards = JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]');

    const AI_SUGGESTIONS = [
      "Top 5 CSE avec le plus de leçons ce trimestre",
      "Évolution du CA par mois sur les 12 derniers mois",
      "Top 10 matières les plus demandées toutes CSE",
      "Taux de conversion des mises en relation par CSE",
      "Membres actifs vs dormants par CSE",
      "CA leçons vs CA pass par mois",
      "CSE avec le meilleur taux d'activation membres",
      "Nombre de nouvelles mises en relation par semaine",
      "Panier moyen wallet par CSE",
      "Top 3 matières par CA sur l'année",
    ];

    /* ── Helpers ── */
    const fmt = (n, d = 0) => n == null ? '–' : isNaN(+n) ? String(n) : (+n).toLocaleString('fr-FR', { minimumFractionDigits: d, maximumFractionDigits: d });
    const fmtEur = (n) => n == null ? '–' : isNaN(+n) ? '–' : (+n).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
    const pct = (a, b) => !b ? 0 : Math.min(100, Math.round(a / b * 100));
    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

    /* ── Sub-components ── */
    const stat = (val, lbl, cls = 'val-neutral') =>
      `<div class="big-stat"><div class="big-val ${cls}">${esc(val)}</div><div class="big-lbl">${esc(lbl)}</div></div>`;

    const prog = (lbl, val, p, cls) =>
      `<div class="prog-block"><div class="prog-meta"><span class="prog-lbl">${esc(lbl)}</span><span class="prog-val">${esc(val)}</span></div><div class="track"><div class="fill ${cls}" style="width:${p}%"></div></div></div>`;

    const kpi = (lbl, val) =>
      `<div class="kpi-row"><span class="kpi-lbl">${esc(lbl)}</span><span class="kpi-val">${esc(val)}</span></div>`;

    const card = (cardId, accentCls, iconCls, icon, title, badge, body) =>
      `<div class="card" data-card="${cardId}"><div class="card-accent ${accentCls}"></div><div class="card-header"><div class="card-title-wrap"><div class="card-icon ${iconCls}">${icon}</div><span class="card-title">${esc(title)}</span></div><div style="display:flex;align-items:center;gap:6px">${badge}<button class="card-toggle" onclick="toggleCard('${cardId}')" title="Masquer">👁</button></div></div><div class="card-body">${body}</div></div>`;

    /* ── Ranking card ── */

    function rankRows() {
      const sorted = [...rankingData].sort((a, b) => {
        const [va, vb] = [a[rankSortKey], b[rankSortKey]];
        const d = typeof va === 'string' ? (va || '').localeCompare(vb || '', 'fr') : ((va ?? -Infinity) - (vb ?? -Infinity));
        return rankSortDir === 'asc' ? d : -d;
      });
      return sorted.map((r, i) => {
        const cap = r.capture_rate ? `<span class="rank-badge rank-badge-capture">${r.capture_rate}%</span>` : '–';
        return `<tr class="rank-clickable" onclick="switchCse('${esc(r.hubspot_company_id || '')}','${esc(r.cse_name || '')}','${esc(r.cse_id || '')}')">
          <td style="color:var(--slate-400);font-size:11px;width:28px">${i + 1}</td>
          <td class="rank-name">${esc(r.cse_name || '—')}</td>
          <td style="text-align:center">${fmt(r.pe_quota_total)}</td>
          <td style="text-align:center">${fmt(r.memberships_total)}</td>
          <td style="text-align:center">${cap}</td>
          <td style="text-align:center">${fmt(r.lessons_total)}</td>
          <td style="text-align:center">${fmtEur(r.lessons_ca)}</td>
          <td style="text-align:center">${fmt(r.mise_relations_total)}</td>
        </tr>`;
      }).join('');
    }

    function sortRanking(key) {
      rankSortDir = key === rankSortKey ? (rankSortDir === 'asc' ? 'desc' : 'asc') : 'desc';
      rankSortKey = key;
      document.querySelectorAll('[data-card="ranking"] th[data-sort-key]').forEach(th => {
        const on = th.dataset.sortKey === key;
        th.classList.toggle('sort-active', on);
        const si = th.querySelector('.si');
        if (si) si.textContent = on ? (rankSortDir === 'desc' ? '↓' : '↑') : '↕';
      });
      const tbody = document.querySelector('[data-card="ranking"] tbody');
      if (tbody) tbody.innerHTML = rankRows();
    }

    function bindRankSort() {
      const thead = document.querySelector('[data-card="ranking"] thead');
      if (!thead || thead._bound) return;
      thead._bound = true;
      thead.addEventListener('click', e => {
        const th = e.target.closest('th[data-sort-key]');
        if (th) sortRanking(th.dataset.sortKey);
      });
    }

    function renderRankingCard() {
      if (!rankingData.length) return '';
      const cols = [
        [null, '#', ''],
        ['cse_name', 'CSE', ''],
        ['pe_quota_total', 'Quota', ' style="text-align:center"'],
        ['memberships_total', 'Membres', ' style="text-align:center"'],
        ['capture_rate', 'Capture', ' style="text-align:center"'],
        ['lessons_total', 'Leçons', ' style="text-align:center"'],
        ['lessons_ca', 'CA', ' style="text-align:center"'],
        ['mise_relations_total', 'MR', ' style="text-align:center"'],
      ];
      const ths = cols.map(([k, l, a]) => {
        if (!k) return `<th>${l}</th>`;
        const on = rankSortKey === k;
        const icon = on ? (rankSortDir === 'desc' ? '↓' : '↑') : '↕';
        return `<th class="rth${on ? ' sort-active' : ''}" data-sort-key="${k}"${a}>${l} <span class="si">${icon}</span></th>`;
      }).join('');
      return `<div class="card col-full" data-card="ranking">
        <div class="card-accent accent-cyan"></div>
        <div class="card-header">
          <div class="card-title-wrap"><div class="card-icon icon-cyan">🏆</div><span class="card-title">Top CSE</span></div>
          <div style="display:flex;align-items:center;gap:6px"><span class="badge badge-cyan">${rankingData.length} CSE</span><button class="card-toggle" onclick="toggleCard('ranking')" title="Masquer">👁</button></div>
        </div>
        <div class="card-body">
          <div class="rank-table-wrap">
            <table class="rank-table">
              <thead><tr>${ths}</tr></thead>
              <tbody>${rankRows()}</tbody>
            </table>
          </div>
          <p style="font-size:10.5px;color:var(--slate-400);margin-top:6px">Cliquez sur un CSE pour voir son détail.</p>
        </div>
      </div>`;
    }

    /* ── CSE combobox ── */
    function toggleCseDropdown() {
      const panel = document.getElementById('cse-combo-panel');
      if (!panel) return;
      if (panel.style.display !== 'none') { closeCseDropdown(); return; }
      panel.style.display = 'block';
      const input = document.getElementById('cse-search');
      if (input) { input.value = ''; input.focus({ preventScroll: true }); }
      filterCse('');
    }

    function closeCseDropdown() {
      const panel = document.getElementById('cse-combo-panel');
      if (panel) panel.style.display = 'none';
    }

    function filterCse(query) {
      const q = (query || '').toLowerCase();
      document.querySelectorAll('#cse-list .cse-opt[data-hid]').forEach(opt => {
        opt.style.display = opt.dataset.name.toLowerCase().includes(q) ? '' : 'none';
      });
    }

    function selectCseOption(hubspotId, name, cseId) {
      closeCseDropdown();
      if (!hubspotId) { clearCse(); return; }
      switchCse(hubspotId, name, cseId);
    }

    /* ── CSE drill-down ── */
    async function switchCse(hubspotId, cseName, cseId) {
      if (!hubspotId) return;
      selectedCseHubspotId = hubspotId;
      selectedCseName = cseName;
      selectedCseId = cseId || null;
      // Update combobox label
      const lbl = document.getElementById('cse-combo-label');
      if (lbl) lbl.textContent = cseName;
      // Show loading banner
      const banner = document.getElementById('cse-banner');
      if (banner) { banner.style.display = 'flex'; banner.querySelector('.cse-banner-title').textContent = `Chargement de ${cseName}…`; }
      await loadCseData();
    }

    async function clearCse() {
      selectedCseHubspotId = null;
      selectedCseName = null;
      selectedCseId = null;
      const lbl = document.getElementById('cse-combo-label');
      if (lbl) lbl.textContent = '— Tous les CSE —';
      const banner = document.getElementById('cse-banner');
      if (banner) banner.style.display = 'none';
      // Restore global cards
      const cardsEl = document.getElementById('cards-container');
      if (cardsEl) cardsEl.innerHTML = globalCardsHTML;
      applyHidden();
      bindAI(false);
    }

    let globalCardsHTML = '';

    async function loadCseData() {
      const cardsEl = document.getElementById('cards-container');
      if (cardsEl) cardsEl.innerHTML = '<div class="state" style="min-height:200px"><div class="spinner"></div><span>Chargement du CSE…</span></div>';
      try {
        const r = await fetch(`${CSE_API}?hubspot_company_id=${encodeURIComponent(selectedCseHubspotId)}&days=${selectedDays}&top_n=10`, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const json = await r.json();
        if (!json.ok) throw new Error(json.error || 'Erreur API');
        if (!json.data?.length) throw new Error('Aucune donnée pour ce CSE');
        renderCseCards(json.data);
        const banner = document.getElementById('cse-banner');
        if (banner) { banner.style.display = 'flex'; banner.querySelector('.cse-banner-title').textContent = `Vue CSE : ${selectedCseName}`; }
      } catch (e) {
        if (cardsEl) cardsEl.innerHTML = `<div class="state error" style="min-height:200px">⚠ ${esc(e.message)}</div>`;
      }
    }

    function renderCseCards(rows) {
      const f = rows[0];
      const membTotal = f.memberships_total || 0;
      const membActive = f.memberships_active || 0;
      const membDormant = f.memberships_dormant || 0;
      const mrTotal = f.mise_relations_total || 0;
      const mrAccepted = f.mise_relations_accepted || 0;
      const mrPeople = f.mr_people_count || 0;
      const mrAvg = f.mr_avg_per_person || 0;
      const lessTotal = f.lessons_total || 0;
      const lessComp = f.lessons_completed || 0;
      const lessCa = f.lessons_ca || 0;
      const passActifs = f.pass_actifs || 0;
      const passCa = f.pass_ca || 0;
      const walletTx = f.wallet_transactions_total || 0;
      const walletTotal = f.wallet_amount_total || 0;
      const walletAvg = f.wallet_amount_avg || 0;
      const peQuota = f.pe_quota_total || 0;
      const peUsed = f.pe_quota_used || 0;

      const themes = rows.filter(r => r.theme && (r.theme_count || 0) > 0)
        .map(r => ({ theme: r.theme, count: r.theme_count }))
        .sort((a, b) => b.count - a.count);

      const pA = pct(membActive, membTotal);
      const pD = pct(membDormant, membTotal);
      const pM = pct(mrAccepted, mrTotal);
      const pL = pct(lessComp, lessTotal);
      const pC = pct(membTotal, peQuota);
      const mT = themes[0]?.count || 1;

      const membCard = card('cse-membres', 'accent-indigo', 'icon-indigo', '👥', 'Membres',
        `<span class="badge badge-indigo">${pA}% actifs</span>`,
        `<div class="big-stats">${stat(fmt(membTotal), 'Total membres', 'val-indigo')}${stat(fmt(membActive), 'Actifs', 'val-emerald')}${stat(fmt(membDormant), 'Dormants', 'val-neutral')}</div>
         ${prog("Taux d'activation", `${pA}%`, pA, 'fill-indigo')}
         ${peQuota > 0 ? `<div class="divider"></div><div class="kpi-list">${kpi('Personnes adressables', fmt(peQuota))}${kpi('Pass utilisés', fmt(peUsed))}</div>${prog('Taux de capture', `${pC}%`, pC, 'fill-cyan')}` : ''}`);

      const mrCard = card('cse-mr', 'accent-emerald', 'icon-emerald', '🤝', 'Mises en Relation',
        mrTotal > 0 ? `<span class="badge badge-emerald">${mrPeople} personnes</span>` : '',
        mrTotal === 0
          ? '<p style="font-size:12px;color:var(--slate-400);padding:8px 0">Aucune MR sur la période.</p>'
          : `<div class="big-stats">${stat(fmt(mrTotal), 'Total MR', 'val-emerald')}${stat(fmt(mrAccepted), 'Acceptées', 'val-emerald')}${stat(`${pM}%`, 'Taux', 'val-emerald')}</div>
             ${prog("Taux d'acceptation", `${fmt(mrAccepted)} / ${fmt(mrTotal)}`, pM, 'fill-emerald')}
             <div class="divider"></div><div class="kpi-list">${kpi('Personnes touchées', fmt(mrPeople))}${kpi('Moyenne / personne', fmt(mrAvg, 1))}</div>`);

      const lessCard = card('cse-lecons', 'accent-violet', 'icon-violet', '📚', 'Leçons',
        lessTotal > 0 ? `<span class="badge badge-violet">${pL}% complétées</span>` : '',
        lessTotal === 0
          ? '<p style="font-size:12px;color:var(--slate-400);padding:8px 0">Aucune leçon sur la période.</p>'
          : `<div class="big-stats">${stat(fmt(lessTotal), 'Total leçons', 'val-violet')}${stat(fmt(lessComp), 'Complétées', 'val-violet')}${stat(`${pL}%`, 'Taux', 'val-violet')}</div>
             ${prog('Taux de complétion', `${fmt(lessComp)} / ${fmt(lessTotal)}`, pL, 'fill-violet')}
             <div class="divider"></div><div class="kpi-list">${kpi('CA leçons', fmtEur(lessCa))}</div>`);

      const walletCard = card('cse-wallet', 'accent-amber', 'icon-amber', '💳', 'Pass & Wallet',
        walletTx > 0 ? `<span class="badge badge-amber">${fmt(walletTx)} tx</span>` : '',
        `<div class="big-stats">${stat(fmt(passActifs), 'Pass actifs', 'val-amber')}${stat(fmt(walletTx), 'Transactions', 'val-amber')}</div>
         <div class="kpi-list">${kpi('CA pass', fmtEur(passCa))}${kpi('Total rechargé', fmtEur(walletTotal))}${kpi('Moy. / transaction', fmtEur(walletAvg))}</div>`);

      const themesCard = themes.length === 0 ? '' :
        `<div class="card col-full" data-card="cse-themes"><div class="card-accent" style="background:linear-gradient(90deg,#fb7185,#f43f5e);height:3px"></div>
         <div class="card-header"><div class="card-title-wrap"><div class="card-icon" style="background:#ffe4e6">🎯</div><span class="card-title">Top Thématiques</span></div><div style="display:flex;align-items:center;gap:6px"><span class="badge" style="background:#ffe4e6;color:#9f1239">${themes.length} matières</span></div></div>
         <div class="card-body"><div style="columns:2;column-gap:24px">${themes.slice(0, 10).map((t, i) => {
          const m = i < 3 ? ['🥇', '🥈', '🥉'][i] : `${i + 1}.`;
          return `<div style="break-inside:avoid;margin-bottom:6px"><div style="display:flex;align-items:center;gap:4px;font-size:11.5px;margin-bottom:2px"><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--slate-700);font-weight:500">${esc(m)} ${esc(t.theme)}</span><span style="font-weight:700;color:#f43f5e;flex-shrink:0">${t.count}</span></div><div class="track sm"><div class="fill" style="width:${pct(t.count, mT)}%;background:linear-gradient(90deg,#fb7185,#f43f5e)"></div></div></div>`;
        }).join('')
        }</div></div></div>`;

      const cseAiCard =
        `<div class="card col-full" data-card="cse-ia"><div class="card-accent accent-ai"></div>
         <div class="card-header"><div class="card-title-wrap"><div class="card-icon icon-violet">✦</div><span class="card-title">Analyse IA — ${esc(selectedCseName)}</span></div><div style="display:flex;align-items:center;gap:6px"><span class="badge badge-violet">GPT-5.2 · CSE</span></div></div>
         <div class="card-body">
           <p class="ai-desc">Posez une question sur ce CSE spécifique — membres, leçons, thématiques, tendances…</p>
           <div class="ai-input-wrap">
             <textarea id="ai-question" rows="3" placeholder=" "></textarea>
             <span id="ai-placeholder">ex : Top 5 membres les plus actifs…</span>
           </div>
           <div class="ai-footer">
             <button id="ai-btn" onclick="handleAI()">✦ Analyser</button>
             <span id="ai-spinner">⏳ Analyse en cours…</span>
             <span class="ai-hint">ou <kbd>⌘↵</kbd> pour envoyer</span>
           </div>
           <div id="ai-result"></div>
         </div></div>`;

      const cardsEl = document.getElementById('cards-container');
      if (cardsEl) {
        cardsEl.innerHTML = `<div class="grid">${membCard}${mrCard}${lessCard}${walletCard}${themesCard}${cseAiCard}</div>`;
        selectedCseId = f.cse_id || selectedCseId;
        bindAI(true);
      }
    }

    /* ── AI binding (global vs CSE) ── */
    let _suggestionTimer = null;
    function bindAI(isCseMode) {
      const q = document.getElementById('ai-question');
      const ph = document.getElementById('ai-placeholder');
      if (!q) return;
      q.addEventListener('focus', () => { if (ph) ph.style.opacity = '0'; });
      q.addEventListener('blur', () => { if (ph && !q.value) ph.style.opacity = '1'; });
      q.addEventListener('input', () => { if (ph) ph.style.opacity = q.value ? '0' : '1'; });
      q.onkeydown = e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleAI(isCseMode); };
      const btn = document.getElementById('ai-btn');
      if (btn) btn.onclick = () => handleAI(isCseMode);
      if (_suggestionTimer) clearInterval(_suggestionTimer);
      _suggestionTimer = setInterval(() => {
        if (document.activeElement === q || q.value) return;
        if (!ph) return;
        ph.style.opacity = '0';
        setTimeout(() => {
          suggestionIdx = (suggestionIdx + 1) % AI_SUGGESTIONS.length;
          ph.textContent = `ex : ${AI_SUGGESTIONS[suggestionIdx]}…`;
          ph.style.opacity = '1';
        }, 400);
      }, 3000);
    }

    /* ── Render ── */
    function render(rows) {
      const f = rows[0];

      const days = f.window_days || selectedDays;
      const membTotal = f.memberships_total || 0;
      const membActive = f.memberships_active || 0;
      const membDormant = f.memberships_dormant || 0;
      const mrTotal = f.mise_relations_total || 0;
      const mrAccepted = f.mise_relations_accepted || 0;
      const mrPeople = f.mr_people_count || 0;
      const mrAvg = f.mr_avg_per_person || 0;
      const lessTotal = f.lessons_total || 0;
      const lessComp = f.lessons_completed || 0;
      const lessCa = f.lessons_ca || 0;
      const passActifs = f.pass_actifs || 0;
      const passCa = f.pass_ca || 0;
      const walletTx = f.wallet_transactions_total || 0;
      const walletTotal = f.wallet_amount_total || 0;
      const walletAvg = f.wallet_amount_avg || 0;
      const peQuota = f.pe_quota_total || 0;

      const pA = pct(membActive, membTotal);
      const pD = pct(membDormant, membTotal);
      const pM = pct(mrAccepted, mrTotal);
      const pL = pct(lessComp, lessTotal);
      const pC = pct(membTotal, peQuota);

      /* Cards */
      const membCard = card('membres', 'accent-indigo', 'icon-indigo', '👥', 'Membres',
        `<span class="badge badge-indigo">${pA}% actifs</span>`,
        `<div class="big-stats">${stat(fmt(membTotal), 'Total membres', 'val-indigo')}${stat(fmt(membActive), 'Actifs', 'val-emerald')}${stat(fmt(membDormant), 'Dormants', 'val-neutral')}</div>
         ${prog("Taux d'activation", `${pA}%`, pA, 'fill-indigo')}
         ${peQuota > 0 ? `<div class="divider"></div><div class="kpi-list">${kpi('Personnes adressables', fmt(peQuota))}</div>${prog('Taux de capture', `${pC}%`, pC, 'fill-cyan')}` : ''}`);

      const mrCard = card('mr', 'accent-emerald', 'icon-emerald', '🤝', 'Mises en Relation',
        mrTotal > 0 ? `<span class="badge badge-emerald">${mrPeople} personnes</span>` : '',
        mrTotal === 0
          ? '<p style="font-size:12px;color:var(--slate-400);padding:8px 0">Aucune mise en relation sur la période.</p>'
          : `<div class="big-stats">${stat(fmt(mrTotal), 'Total MR', 'val-emerald')}${stat(fmt(mrAccepted), 'Acceptées', 'val-emerald')}${stat(`${pM}%`, 'Taux', 'val-emerald')}</div>
             ${prog("Taux d'acceptation", `${fmt(mrAccepted)} / ${fmt(mrTotal)}`, pM, 'fill-emerald')}
             <div class="divider"></div><div class="kpi-list">${kpi('Personnes touchées', fmt(mrPeople))}${kpi('Moyenne / personne', fmt(mrAvg, 1))}</div>`);

      const lessCard = card('lecons', 'accent-violet', 'icon-violet', '📚', 'Leçons',
        lessTotal > 0 ? `<span class="badge badge-violet">${pL}% complétées</span>` : '',
        lessTotal === 0
          ? '<p style="font-size:12px;color:var(--slate-400);padding:8px 0">Aucune leçon sur la période.</p>'
          : `<div class="big-stats">${stat(fmt(lessTotal), 'Total leçons', 'val-violet')}${stat(fmt(lessComp), 'Complétées', 'val-violet')}${stat(`${pL}%`, 'Taux', 'val-violet')}</div>
             ${prog('Taux de complétion', `${fmt(lessComp)} / ${fmt(lessTotal)}`, pL, 'fill-violet')}
             <div class="divider"></div><div class="kpi-list">${kpi('CA leçons', fmtEur(lessCa))}</div>`);

      const walletCard = card('wallet', 'accent-amber', 'icon-amber', '💳', 'Pass & Wallet',
        walletTx > 0 ? `<span class="badge badge-amber">${fmt(walletTx)} tx</span>` : '',
        `<div class="big-stats">${stat(fmt(passActifs), 'Pass actifs', 'val-amber')}${stat(fmt(walletTx), 'Transactions', 'val-amber')}</div>
         <div class="kpi-list">${kpi('CA pass', fmtEur(passCa))}${kpi('Total rechargé', fmtEur(walletTotal))}${kpi('Moy. / transaction', fmtEur(walletAvg))}</div>`);

      const aiCard =
        `<div class="card col-full" data-card="ia"><div class="card-accent accent-ai"></div>
         <div class="card-header"><div class="card-title-wrap"><div class="card-icon icon-violet">✦</div><span class="card-title">Analyse IA</span></div><div style="display:flex;align-items:center;gap:6px"><span class="badge badge-violet">GPT-5.2 · Global</span><button class="card-toggle" onclick="toggleCard('ia')" title="Masquer">👁</button></div></div>
         <div class="card-body">
           <p class="ai-desc">Posez une question en langage naturel sur l'ensemble des CSE — comparaisons, tendances, top matières, CA global…</p>
           <div class="ai-input-wrap">
             <textarea id="ai-question" rows="3" placeholder=" "></textarea>
             <span id="ai-placeholder">ex : ${esc(AI_SUGGESTIONS[0])}…</span>
           </div>
           <div class="ai-footer">
             <button id="ai-btn" onclick="handleAI(false)">✦ Analyser</button>
             <span id="ai-spinner">⏳ Analyse en cours…</span>
             <span class="ai-hint">ou <kbd>⌘↵</kbd> pour envoyer</span>
           </div>
           <div id="ai-result"></div>
         </div></div>`;

      const cseItems = rankingData.length
        ? [...rankingData].sort((a, b) => (a.cse_name || '').localeCompare(b.cse_name || '', 'fr'))
            .map(r => `<div class="cse-opt" data-hid="${esc(r.hubspot_company_id || '')}" data-name="${esc(r.cse_name || '')}" onclick="selectCseOption('${esc(r.hubspot_company_id || '')}','${esc(r.cse_name || '')}','${esc(r.cse_id || '')}')">${esc(r.cse_name || '—')}</div>`).join('')
        : '';

      globalCardsHTML = `<div class="grid">${membCard}${mrCard}${lessCard}${walletCard}${renderRankingCard()}${aiCard}</div>`;

      document.getElementById('root').innerHTML = `
        <div class="hero"><div class="hero-inner">
          <div class="hero-left">
            <span class="hero-eyebrow">Sales Cockpit · Head of Sales <span style="opacity:.5">· v1.3</span></span>
            <span class="hero-name">Superprof B2B — Performance Globale</span>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <div class="period-tabs">
                <button class="period-tab ${selectedDays === 30 ? 'active' : ''}" onclick="switchPeriod(30)">30 jours</button>
                <button class="period-tab ${selectedDays === 90 ? 'active' : ''}" onclick="switchPeriod(90)">90 jours</button>
                <button class="period-tab ${selectedDays === 365 ? 'active' : ''}" onclick="switchPeriod(365)">1 an</button>
              </div>
              ${cseItems ? `<div id="cse-combobox" class="cse-combo"><button id="cse-combo-btn" class="cse-combo-btn" onclick="toggleCseDropdown()"><span id="cse-combo-label" class="cse-combo-label">— Tous les CSE —</span><span class="cse-combo-arrow">▾</span></button><div id="cse-combo-panel" class="cse-combo-panel" style="display:none"><div class="cse-search-wrap"><input type="text" id="cse-search" class="cse-search-input" placeholder="Rechercher un CSE…" oninput="filterCse(this.value)" autocomplete="off"></div><div id="cse-list" class="cse-list"><div class="cse-opt" onclick="selectCseOption('','','')">— Tous les CSE —</div>${cseItems}</div></div></div>` : ''}
            </div>
          </div>
          <div class="hero-right">
            <div class="hero-stat"><div class="hero-stat-value">${fmt(membTotal)}</div><div class="hero-stat-label">membres</div></div>
            <div class="hero-sep"></div>
            <div class="hero-stat"><div class="hero-stat-value">${fmtEur(lessCa + passCa)}</div><div class="hero-stat-label">CA total</div></div>
            <div class="hero-sep"></div>
            <div class="hero-stat"><div class="hero-stat-value">${fmt(lessTotal)}</div><div class="hero-stat-label">leçons</div></div>
            <button class="dark-toggle" onclick="toggleDark()" title="Mode sombre / clair">${document.body.classList.contains('dark') ? '☀️' : '🌑'}</button>
          </div>
        </div></div>
        <div id="cse-banner" class="cse-banner" style="display:none">
          <span class="cse-banner-title"></span>
          <button class="cse-banner-back" onclick="clearCse()">← Vue globale</button>
        </div>
        <div id="restore-bar" class="restore-bar"></div>
        <div id="cards-container">${globalCardsHTML}</div>`;

      applyHidden();
      bindAI(false);
      bindRankSort();
      if (!document._cseOutside) {
        document._cseOutside = true;
        document.addEventListener('click', e => { if (!e.target.closest('#cse-combobox')) closeCseDropdown(); }, true);
      }
    }

    /* ── Card visibility ── */
    const CARD_LABELS = { membres: '👥 Membres', mr: '🤝 MR', lecons: '📚 Leçons', wallet: '💳 Wallet', ranking: '🏆 Top CSE', ia: '✦ IA' };

    function toggleCard(name) {
      if (!hiddenCards.includes(name)) hiddenCards.push(name);
      localStorage.setItem(HIDDEN_KEY, JSON.stringify(hiddenCards));
      applyHidden();
    }
    function restoreCard(name) {
      hiddenCards = hiddenCards.filter(n => n !== name);
      localStorage.setItem(HIDDEN_KEY, JSON.stringify(hiddenCards));
      applyHidden();
    }
    function applyHidden() {
      document.querySelectorAll('[data-card]').forEach(el => {
        el.classList.toggle('card-hidden', hiddenCards.includes(el.dataset.card));
      });
      const bar = document.getElementById('restore-bar');
      if (bar) bar.innerHTML = hiddenCards.map(n =>
        `<button class="restore-chip" onclick="restoreCard('${n}')">+ ${CARD_LABELS[n] || n}</button>`
      ).join('');
    }

    /* ── Period ── */
    function switchPeriod(days) {
      if (days === selectedDays) return;
      selectedDays = days;
      // Update tab visuals immediately (without full re-render)
      document.querySelectorAll('.period-tab').forEach((b, i) => {
        b.classList.toggle('active', [30, 90, 365][i] === days);
      });
      // Reload appropriate view: CSE if one is selected, global otherwise
      if (selectedCseHubspotId) {
        loadCseData();
      } else {
        loadData();
      }
    }

    /* ── Dark mode ── */
    function toggleDark() {
      document.body.classList.toggle('dark');
      localStorage.setItem('cockpit-dark', document.body.classList.contains('dark'));
      document.querySelectorAll('.dark-toggle').forEach(b => { b.textContent = document.body.classList.contains('dark') ? '☀️' : '🌑'; });
    }

    /* ── Export CSV ── */
    function exportCSV() {
      if (!lastAiRows.length) return;
      const e = v => { v = v == null ? '' : String(v); return (v.includes(',') || v.includes('"') || v.includes('\n')) ? `"${v.replace(/"/g, '""')}"` : v; };
      const csv = [lastAiCols.join(','), ...lastAiRows.map(r => lastAiCols.map(c => e(r[c])).join(','))].join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
      a.download = `cockpit-global-ia-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
    }

    /* ── AI ── */
    async function handleAI(isCseMode) {
      const q = document.getElementById('ai-question').value.trim();
      if (!q) return;
      const btn = document.getElementById('ai-btn');
      const sp = document.getElementById('ai-spinner');
      const res = document.getElementById('ai-result');
      btn.disabled = true; sp.style.display = 'inline'; res.style.display = 'none';
      try {
        const endpoint = isCseMode ? CSE_AI_API : AI_API;
        const params = new URLSearchParams({ question: q });
        if (isCseMode && selectedCseId) params.set('cse_id', selectedCseId);
        const r = await fetch(`${endpoint}?${params}`, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const json = await r.json();
        if (!json.ok) {
          let html = `<p style="font-size:12px;color:var(--rose);margin-top:8px">⚠ ${esc(json.error || 'Erreur IA')}</p>`;
          if (json.sql) html += `<details open><summary>▸ SQL généré</summary><pre>${esc(json.sql)}</pre></details>`;
          if (json.details) html += `<details><summary>▸ Détail de l'erreur</summary><pre>${esc(typeof json.details === 'string' ? json.details : JSON.stringify(json.details, null, 2))}</pre></details>`;
          res.innerHTML = html;
          res.style.display = 'block';
          return;
        }
        const rows = Array.isArray(json.data) ? json.data : [];
        if (!rows.length) {
          res.innerHTML = '<p style="font-size:12px;color:var(--slate-400);margin-top:8px;padding-left:10px;border-left:2px solid var(--indigo-light)">Aucun résultat pour cette question.</p>';
        } else {
          const cols = Object.keys(rows[0]);
          lastAiRows = rows; lastAiCols = cols;
          const thead = '<tr>' + cols.map(c => `<th>${esc(c.replace(/_/g, ' '))}</th>`).join('') + '</tr>';
          const tbody = rows.slice(0, 50).map(r => '<tr>' + cols.map(c => `<td>${esc(r[c] == null ? '–' : String(r[c]))}</td>`).join('') + '</tr>').join('');
          let html = '';
          if (json.question) html += `<p class="ai-quote">&ldquo;${esc(json.question)}&rdquo;</p>`;
          html += `<div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
          html += `<button class="csv-btn" onclick="exportCSV()">📥 Exporter CSV <span style="opacity:.6;font-weight:400">(${rows.length} lignes)</span></button>`;
          if (json.sql) html += `<details style="margin-top:6px"><summary>▸ Voir le SQL généré</summary><pre>${esc(json.sql)}</pre></details>`;
          res.innerHTML = html;
        }
        res.style.display = 'block';
      } catch (e) {
        res.innerHTML = `<p style="font-size:12px;color:var(--rose);margin-top:8px">⚠ ${esc(e.message)}</p>`;
        res.style.display = 'block';
      } finally {
        btn.disabled = false; sp.style.display = 'none';
      }
    }

    /* ── Init ── */
    async function loadData() {
      document.getElementById('root').innerHTML = '<div class="state"><div class="spinner"></div><span>Chargement…</span></div>';
      try {
        const r = await fetch(`${API}?days=${selectedDays}&ranking=true`, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const json = await r.json();
        if (!json.ok) throw new Error(json.error || 'Erreur API');
        if (!json.data?.length) throw new Error('Aucune donnée disponible');
        rankingData = Array.isArray(json.ranking) ? json.ranking : [];
        render(json.data);
        if (document.body.classList.contains('dark')) {
          document.querySelectorAll('.dark-toggle').forEach(b => { b.textContent = '☀️'; });
        }
      } catch (e) {
        document.getElementById('root').innerHTML = `<div class="state error">⚠ ${esc(e.message)}</div>`;
      }
    }

    (async () => {
      if (!TOKEN) {
        document.getElementById('root').innerHTML = '<div class="state error">⚠ Token manquant — accès non autorisé</div>';
        return;
      }
      if (localStorage.getItem('cockpit-dark') === 'true') document.body.classList.add('dark');
      await loadData();
    })();
  </script>
</body>

</html>
