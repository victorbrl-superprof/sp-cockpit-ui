    function rerenderTeamPrime(newKey, quartersByKey, config) {
      const t = renderTiers(quartersByKey, newKey);
      const body = document.getElementById("team-prime-body");
      const head = document.querySelector("#team-prime-card .card-head");
      if (!body || !head) return;
      body.innerHTML = t.html;
      const titleEl = head.querySelector("h3");
      const metaEl = head.querySelector(".meta");
      if (titleEl) titleEl.innerHTML = `<span class="head-ico">🏆</span>Prime d'équipe · ${esc(t.quarterLabel)}`;
      if (metaEl) metaEl.innerHTML = `Remise à zéro chaque trimestre · CA HT ${esc(t.active.label)} : <strong>${fmtEur(t.active.ht)}</strong> · ${t.active.deals} deals`;

        body.querySelectorAll(".tier-fill").forEach(el => { el.style.width = el.getAttribute("data-w") + "%"; });

      bindQuarterTabs("#team-prime-card", quartersByKey, (k) => rerenderTeamPrime(k, quartersByKey, config));

    function renderRdvDashboard(config, stats, projection, teamContext, rawData) {
      const { quartersByKey, activeKey: _activeKey, currentKey, teamHT, teamDealsCount } = teamContext;
      const activeKey = _activeKey || currentKey;
      const tiers = renderTiers(quartersByKey, activeKey);
      const activeQuarter = tiers.active;
      const pLabel = periodLabel(config);
      const rowsHtml = stats.rows.map((r, i) => {
        const objPill = r.atteint ? '<span class="pill ok">✓</span>' : (r.isFuture ? '<span class="pill future">à venir</span>' : '');
        return `<tr${i === stats.bestIdx ? ' class="best-month"' : ''}>
          <td><strong>${esc(r.label)}</strong>${i === stats.bestIdx ? ' 👑' : ''}</td>
          <td class="num">${fmtNum(r.rdv)}</td>
          <td class="num">${fmtNum(r.target)} ${objPill}</td>
          <td class="num">${fmtEur(r.primeRdv)}</td>
          <td class="num">${fmtNum(r.transactions)}</td>
          <td class="num">${fmtEur(r.primeTransactions)} <span class="pill zero">${fmtEur(r.unitPrime)}/tx</span></td>

      }).join("");

      document.getElementById("root").innerHTML = `
        <div class="hero">
          <div class="hero-head">
            <div class="hero-title">
              <div>
                <h1>Prime 2026 — ${esc(config.name)}</h1>
                <div class="sub">${esc(config.role)} · ${pLabel} · objectif ${fmtNum(config.rdvTarget)} RDV/mois · 5% HT si signature</div>
              </div>
            </div>
            <div class="hero-actions">
              ${renderTeamSwitcher(config)}
              <div class="badge">Live HubSpot</div>
              <button class="hero-action hero-action-icon" type="button" aria-haspopup="dialog" aria-controls="definitions-modal-backdrop" aria-label="Ouvrir les définitions" title="Définitions" onclick="openDefinitionsModal()">${SETTINGS_ICON}<span class="sr-only">Définitions</span></button>
            </div>
          </div>
        </div>

        <div class="grid">
          <div class="kpis">
            <div class="kpi glass indigo  reveal" style="animation-delay:.05s">
              <span class="accent"></span><span class="glow"></span>
              <div class="lbl"><span class="dot"></span>RDV pris ${pLabel}</div>
              <div class="val" data-countup="${stats.totalRdv}" data-countup-format="num">${fmtNum(0)}</div>
              <div class="sub">meetings créés par Lucas · objectif période : ${fmtNum(stats.targetTotal)} RDV</div>
            </div>
            <div class="kpi glass emerald reveal" style="animation-delay:.13s">
              <span class="accent"></span><span class="glow"></span>
              <div class="lbl"><span class="dot"></span>Prime RDV</div>
              <div class="val" data-countup="${stats.totalPrimeRdv}">${fmtEur(0)}</div>
              <div class="sub">paliers 50 / 100 / 150 €</div>
            </div>
            <div class="kpi glass amber   reveal" style="animation-delay:.21s">
              <span class="accent"></span><span class="glow"></span>
              <div class="lbl"><span class="dot"></span>Transactions ouvertes</div>
              <div class="val" data-countup="${stats.totalTransactions}" data-countup-format="num">${fmtNum(0)}</div>
              <div class="sub">${fmtEur(stats.totalPrimeTransactions)} de prime transaction éligible</div>
            </div>
            <div class="kpi glass violet  reveal" style="animation-delay:.29s">
              <span class="accent"></span><span class="glow"></span>
              <div class="lbl"><span class="dot"></span>Total variable estimé</div>
              <div class="val" data-countup="${stats.total}">${fmtEur(0)}</div>
              <div class="sub">RDV + transactions + signatures</div>
            </div>
          </div>

          <div class="glass reveal" style="animation-delay:.40s">
            <div class="card-head">
              <h3><span class="head-ico">🏅</span>Trophées de la saison</h3>
              <span class="meta">objectifs Lucas</span>
            </div>
            <div class="card-body">${renderRdvAchievements(stats)}</div>
          </div>

          <div class="glass reveal" style="animation-delay:.50s">
            <div class="card-head">
              <h3><span class="head-ico">📊</span>RDV mensuels vs objectif</h3>
              <span class="meta">${pLabel} · comptage par date de création du meeting · objectif = barre claire pointillée</span>
            </div>
            <div class="card-body">${renderCountChart(stats.rows, stats.bestIdx, config.rdvTarget)}</div>
          </div>

          ${renderProjectionSummary(config, stats, projection)}

          ${renderRdvPilotTable(projection)}

          ${renderRdvRules(config.rdvTarget)}

          <div class="glass reveal" style="animation-delay:.60s">
            <div class="card-head">
              <h3><span class="head-ico">🧾</span>Détail mensuel</h3>
              <span class="meta">RDV créés par Lucas, deals rattachés aux comptes ou contacts concernés</span>
            </div>
            <div class="card-body" style="padding:0">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Mois</th>
                      <th class="num">RDV</th>
                      <th class="num">Objectif</th>
                      <th class="num">Prime RDV</th>
                      <th class="num">Tx éligibles</th>
                      <th class="num">Prime tx</th>
                      <th class="num">5% signatures</th>
                      <th class="num">Total</th>

                  </thead>

                </table>
              </div>
            </div>
          </div>

          ${renderRdvSimulator(config, projection)}

          <div class="glass reveal" id="team-prime-card" style="animation-delay:.72s">
            <div class="card-head">
              <h3><span class="head-ico">🏆</span>Prime d'équipe · ${esc(tiers.quarterLabel)}</h3>
              <span class="meta">Remise à zéro chaque trimestre · CA HT ${esc(activeQuarter.label)} : <strong>${fmtEur(activeQuarter.ht)}</strong> · ${activeQuarter.deals} deals · cumul année : ${fmtEur(teamHT)} (${teamDealsCount} deals)</span>
            </div>
            <div class="card-body" id="team-prime-body">${tiers.html}</div>
          </div>

          ${renderPrimeAiCard(config)}

          <div class="footer">
            Calculé en direct depuis HubSpot · RDV = meetings créés par Lucas non annulés, regroupés par mois de création · Transactions = deals rattachés aux comptes ou contacts de ces meetings · Prévisionnel = deals encore ouverts rattachés à ces meetings · Prime d'équipe = tous les closedwon HubSpot, cumulés par trimestre en HT (remise à zéro chaque trimestre) · Information interne, sans valeur contractuelle.
          </div>
        </div>
        ${renderDefinitionsModal(config)}
      `;

      document.querySelectorAll("[data-countup]").forEach(el => {
        const v = parseFloat(el.getAttribute("data-countup"));

    function renderError(msg) {
      document.getElementById("root").innerHTML = `<div class="error"><strong>Erreur :</strong> ${esc(msg)}</div>`;
    }

    // ── Confetti ──────────────────────────────────────────────────────────────
    function confetti({ burst = 1 } = {}) {
      const cvs = document.getElementById("confetti");
      const ctx = cvs.getContext("2d");
      function resize() { cvs.width = innerWidth; cvs.height = innerHeight; }
      resize(); addEventListener("resize", resize);

      const colors = ["#6366f1","#10b981","#f59e0b","#f43f5e","#8b5cf6","#06b6d4","#eab308"];
      const parts = [];
      const bursts = Math.min(burst, 4);
      for (let b = 0; b < bursts; b++) {
        setTimeout(() => {
          for (let i = 0; i < 130; i++) {
            parts.push({
              x: innerWidth * (0.3 + Math.random() * 0.4),
              y: innerHeight * 0.2,
              vx: (Math.random() - 0.5) * 13,
              vy: -Math.random() * 14 - 4,
              g:  0.35 + Math.random() * 0.15,
              size: 5 + Math.random() * 4,
              rot: Math.random() * Math.PI * 2,
              vr:  (Math.random() - 0.5) * 0.35,
              color: colors[(Math.random() * colors.length) | 0],
              life: 150 + Math.random() * 40,
            });
          }
        }, b * 350);
      }
      (function loop() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        for (let i = parts.length - 1; i >= 0; i--) {
          const p = parts[i];
          p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
          if (p.life <= 0 || p.y > cvs.height + 20) { parts.splice(i, 1); continue; }
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.5);
          ctx.restore();
        }
        if (parts.length > 0) requestAnimationFrame(loop);
        else ctx.clearRect(0, 0, cvs.width, cvs.height);
      })();
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    (async () => {
      const config = CONFIG[OWNER];
      if (!config) { renderError(`Aucune fiche de prime configurée pour l'owner ${OWNER || "(manquant)"}.`); return; }
      if (!TOKEN)  { renderError("Token d'accès manquant dans l'URL."); return; }

      try {
        const res  = await fetch(`${API}?owner_id=${encodeURIComponent(OWNER)}&mode=${encodeURIComponent(config.type || "ae")}`, {
          headers: { Authorization: `Bearer ${TOKEN}` },
        });
        const json = await res.json();
        if (!res.ok || !json.ok) throw new Error(json.error || `HTTP ${res.status}`);

        const sourceMonthly  = config.type === "teamLead" ? monthlyFromTeamAgg(json.team_monthly) : undefined;
        // Pour Camille on isole ses propres signatures parmi les deals équipe afin d'évaluer
        // la sur-performance perso (distincte de la sur-performance équipe). On filtre par owner_id.
        const persoMonthly   = config.type === "teamLead"
          ? monthlyFromDeals((json.deals || []).filter(d => String(d.owner_id || "") === String(OWNER)))
          : undefined;
        const stats          = config.type === "rdv"
          ? computeRdv(json.meetings || [], json.opened_deals || [], json.deals || [], config)
          : compute(json.deals || [], config, { byMonth: sourceMonthly, byMonthPerso: persoMonthly });
        // Pour Hugo / Johanna : 5% HT sur les deals où ils ont pris le RDV mais qu'un autre a signé.
        const kickback       = config.type === "ae"
          ? computeKickback(json.kickback_deals || [], 0.05)
          : { byMonth: {}, totalHT: 0, totalCount: 0, totalCommission: 0, rate: 0.05 };
        if (config.type === "ae" && kickback.totalCommission > 0) {
          stats.kickback = kickback;
          stats.commTotal += kickback.totalCommission;
        } else if (config.type === "ae") {
          stats.kickback = kickback;
        }
        const projection     = config.type === "rdv"
          ? buildRdvProjection(config, stats, json.pipeline_deals || [])
          : buildSalesProjection(config, stats, json.pipeline_deals || []);
        const teamTotalTTC   = json.team_total_amount ?? json.team_total_ttc ?? json.team_total ?? 0;
        const teamHT         = teamTotalTTC / TVA;
        const teamDealsCount = json.team_deals_count || 0;
        const quartersByKey  = computeQuartersHT(json.team_monthly || {});
        const currentKey     = currentQuarterKey();
        const teamContext    = {
          quartersByKey,
          activeKey: currentKey,
          currentKey,
          teamHT,
          teamTotalTTC,
          teamDealsCount,
        };
        if (config.type === "rdv") renderRdvDashboard(config, stats, projection, teamContext, json);
        else renderDashboard(config, stats, projection, teamContext, json);
      } catch (e) {
        renderError(e.message || String(e));
      }
    })();
  </script>
